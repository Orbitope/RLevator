# config/elevator_poca_e6a_m.yaml — E6 Architecture A, CORRECTED: MA-POCA, rung M
#   mlagents-learn config/elevator_poca_e6a_m.yaml --run-id=<name>
#
# trainer_type: poca (MA-POCA) — the fix for Architecture A. The first attempt
# (config/elevator_ppo_e6a_m.yaml, trainer_type ppo) treated the broadcast team reward as an
# individual per-agent reward with a decentralized critic and FAILED TO LEARN (flat reward,
# delivered=0 — see EXPERIMENT_PLAN.md E6-A). Elevator dispatch is fully cooperative, so it needs a
# centralized critic over all cars. BuildingManager now registers the N ElevatorCarAgents in a
# SimpleMultiAgentGroup and credits reward via AddGroupReward / GroupEpisodeInterrupted, which
# poca's centralized value function consumes. Same shared per-car policy (Behavior "ElevatorCar",
# fixed per-car obs, one size-6 action) — parameter sharing is unchanged; only the trainer/critic
# and the C# reward routing (group vs per-agent) change.
#
# Hyperparameters identical to the flat-MLP E3 runs and the ppo A attempt (poca reuses PPO's
# OnPolicy hyperparameter set), so architecture+trainer is the only variable. No curriculum.
behaviors:
  ElevatorCar:
    trainer_type: poca
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 256
      num_layers: 2
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
