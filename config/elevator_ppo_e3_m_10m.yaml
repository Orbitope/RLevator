# config/elevator_ppo_e3_m_10m.yaml — extends elev-e3-m-ppo-01 from 5M to 10M steps
#   mlagents-learn config/elevator_ppo_e3_m_10m.yaml --run-id=elev-e3-m-ppo-01 --resume
#
# Rung M's 5M-step run (elevator_ppo_e3_m.yaml) plateaued far below LOOK/ETA, but its reward
# curve was still climbing when cut off (see EXPERIMENT_PLAN.md E3) — meaningfully faster than
# rung S's curve was in its own late-training window, where S had clearly flattened by 5M. That's
# evidence for "hasn't finished training yet" rather than "architecture too small," so before
# touching network capacity, this just doubles the step budget on the exact same
# hyperparameters/architecture and resumes from the existing checkpoint rather than retraining
# from scratch.
#
# NOTE: ML-Agents' linear learning_rate/beta/epsilon schedules are recomputed from
# current_step/max_steps on resume — bumping max_steps here means those will jump back up from
# their fully-decayed 5M-step values rather than continuing to decay smoothly. Expected and
# generally benign (often even helps escape a plateau); flagging so a mid-run LR discontinuity in
# the TensorBoard curves isn't mistaken for a bug.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 256
      num_layers: 2
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 10.0e6
    time_horizon: 256
    summary_freq: 20000
