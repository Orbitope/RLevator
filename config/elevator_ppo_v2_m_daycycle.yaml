# config/elevator_ppo_v2_m_daycycle.yaml — V2 pattern coverage: rung M, full day-cycle, nominal load
#   mlagents-learn config/elevator_ppo_v2_m_daycycle.yaml --run-id=<name>
#
# use_day_cycle=1 runs the full continuous 48-bin 12h day (all patterns as time-slices of one
# episode) rather than a fixed named pattern -- the generalist arm: one policy that must handle
# UpPeak/Lunch/DownPeak/Midday's transitions within a single episode, not specialize on one.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
environment_parameters:
  use_day_cycle: 1
