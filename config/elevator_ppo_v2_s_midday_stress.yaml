# config/elevator_ppo_v2_s_midday_stress.yaml — V0/V2 stress load point (intensity=1.5), rung S, Midday
#   mlagents-learn config/elevator_ppo_v2_s_midday_stress.yaml --run-id=<name>
#
# Same recipe as elev-v2-s-midday-01 (nominal, intensity=1.0) -- completes the nominal/stress
# pair at rung S, where nominal was a near three-way tie. Stress may be where S starts to show
# leverage (V0's sweep found up to 21% wait-time spread between heuristics at some stress cells).
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
environment_parameters:
  traffic_pattern: 3
  use_day_cycle: 0
  intensity: 1.5
