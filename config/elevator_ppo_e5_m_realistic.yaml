# config/elevator_ppo_e5_m_realistic.yaml — E5 obs ablation Arm 2: realistic (no wait-age), rung M
#   mlagents-learn config/elevator_ppo_e5_m_realistic.yaml --run-id=<name>
#
# Same 1024x5 network as the other E5 arms (see elevator_ppo_e5_m_fullstate.yaml's header for why).
# ObservationConfig_Realistic: baseline minus hallCallAge, plus queueLengths -- trades "how long has
# someone waited" for "how many are waiting."
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 1024
      num_layers: 5
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
