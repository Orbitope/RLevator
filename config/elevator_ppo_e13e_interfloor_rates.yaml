# config/elevator_ppo_e13e_interfloor_rates.yaml — E13e: baseline + arrival-RATE obs, interfloor
#   mlagents-learn config/elevator_ppo_e13e_interfloor_rates.yaml --run-id=elev-e13e-m-interfloor-rates-NN
#
# Fills the biggest gap vs the 2024 Traffic-Pattern-Aware paper: it feeds 2 per-floor arrival-RATE
# channels (from-rate/to-rate) on a separate FC pathway; we fed NO rate signal at all. Richer than a
# pattern one-hot -- it localizes demand (where + how much), not just which named regime.
#
# Deliberately NO conv here: this isolates the VALUE OF THE RATE INFORMATION using the same flat
# bignet2 recipe (768x4) as the E12 interfloor baseline, so the only variable vs that run is the
# +2F rate block (obsSize 254 -> 286 on rung M). Unlike E13b's grid (which only restructured info the
# flat obs already had, and so merely sped up early learning), rates are NEW information and can move
# the ASYMPTOTE.
#
# Bonus hypothesis (E13c): the rate block also encodes the LOAD LEVEL, so a rate-aware policy may
# adapt across intensities -- possibly defusing the train(1.0)/eval(0.5) regime mismatch for free.
# Setup: Tools/Elevator RL/E13 Conv/Point Agent At Rates Obs Config -> rebuild headless.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
environment_parameters:
  traffic_pattern: 3
  use_day_cycle: 0
