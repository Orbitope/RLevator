# config/elevator_ppo_v2_l_midday_10m.yaml — extends elev-v2-l-midday-01 from 5M to 10M steps
#   mlagents-learn config/elevator_ppo_v2_l_midday_10m.yaml --run-id=elev-v2-l-midday-01 --resume
#
# Same bignet2 recipe as the V2 M/S runs on the corrected (E15) traffic, but reward was still
# climbing at the 5M cutoff (unlike S and M, which had both plateaued by 5M) -- extending per
# the established cheap-test-first protocol before evaluating this rung.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 10.0e6
    time_horizon: 256
    summary_freq: 20000
environment_parameters:
  traffic_pattern: 3
  use_day_cycle: 0
