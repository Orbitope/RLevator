# config/elevator_ppo_e6a_m.yaml — E6 Architecture A (multi-agent parameter sharing), rung M
#   mlagents-learn config/elevator_ppo_e6a_m.yaml --run-id=<name>
#
# Behavior name is "ElevatorCar" (NOT "ElevatorController"): the N per-car ElevatorCarAgent
# instances in TrainingMultiAgent.unity all share this one behavior, so ML-Agents trains a single
# shared policy across every car (this is the parameter sharing — EXPERIMENT_PLAN.md E6,
# plan peaceful-giggling-fern.md Architecture A). Each agent's observation is the fixed-size
# per-car view (Building.WriteCarObservation, 102 floats for M) and its action is one size-6 branch.
#
# Same PPO hyperparameters as the flat-MLP E3 runs so the ONLY thing that changes is the
# architecture (per-car shared policy vs one flat MLP over the whole fleet) — that isolation is
# the whole point of the E6 comparison. No active_elevators curriculum (fixed 5-car M fleet).
#
# STEP-COUNTING CAVEAT (comparability vs the flat-MLP E3 runs): max_steps counts TOTAL agent-steps
# summed across all car agents sharing this behavior. Each decision round, only the eligible cars
# (idle + in service) request a decision, so one round produces up to 5 agent-steps. So 5M steps
# here == 5M shared-policy gradient samples (SAME as the flat MLP's 5M), but FEWER distinct
# environment rounds than the flat MLP saw (it made one 5-car joint decision per step). Equal
# gradient-samples / wall-clock is the chosen first comparison (cheap, ~80min); if E6-A is
# ambiguous vs flat-MLP at 5M, a longer run to match environment rounds is the follow-up — same
# "test cheaply first" logic as the E3 M 5M->10M decision.
behaviors:
  ElevatorCar:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 256
      num_layers: 2
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
