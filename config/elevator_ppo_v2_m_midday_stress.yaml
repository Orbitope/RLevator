# config/elevator_ppo_v2_m_midday_stress.yaml — V0/V2 stress load point (intensity=1.5), rung M, Midday
#   mlagents-learn config/elevator_ppo_v2_m_midday_stress.yaml --run-id=<name>
#
# Same bignet2 recipe as elev-v2-m-midday-01 (nominal, intensity=1.0), differing only in the
# intensity env-param override -- V0's design calls for measuring both load points per rung.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
environment_parameters:
  traffic_pattern: 3
  use_day_cycle: 0
  intensity: 1.5
