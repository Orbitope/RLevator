# config/elevator_ppo_e3_m_bignet_10m.yaml — extends elev-e3-m-bignet-01 from 5M to 10M steps
#   mlagents-learn config/elevator_ppo_e3_m_bignet_10m.yaml --run-id=elev-e3-m-bignet-01 --resume
#
# The bigger flat MLP (512 hidden units x 3 layers, vs the original 256x2) was still climbing at
# its 5M-step cutoff (reward -7290 at step 5,000,192, still noisily improving from -7,700 to
# -7,300 over the last ~1M steps) -- the same "hasn't finished training yet" signature that
# motivated the original 256x2 network's 5M->10M extension and Architecture B's. Same
# cheap-test-first logic: double the step budget on the identical architecture/hyperparameters and
# resume from the existing checkpoint rather than retraining from scratch.
#
# NOTE: ML-Agents' linear learning_rate/beta/epsilon schedules recompute from
# current_step/max_steps on resume -- bumping max_steps here means those jump back up from their
# fully-decayed 5M-step values rather than continuing to decay smoothly. Expected and generally
# benign; flagging so a mid-run LR discontinuity in TensorBoard isn't mistaken for a bug.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 512
      num_layers: 3
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 10.0e6
    time_horizon: 256
    summary_freq: 20000
