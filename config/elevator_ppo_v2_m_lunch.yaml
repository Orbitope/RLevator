# config/elevator_ppo_v2_m_lunch.yaml — V2 pattern coverage: rung M, Lunch, nominal load
#   mlagents-learn config/elevator_ppo_v2_m_lunch.yaml --run-id=<name>
#
# Same recipe as the other V2 M runs. Lunch is the mixed incoming:interfloor:outgoing pattern
# (CIBSE-calibrated ~23:43:33 per E15/E12) -- the middle ground between UpPeak/DownPeak's
# lobby-hub structure and Midday's pure interfloor.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
environment_parameters:
  traffic_pattern: 2
  use_day_cycle: 0
