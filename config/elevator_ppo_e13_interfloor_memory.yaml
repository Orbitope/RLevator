# config/elevator_ppo_e13_interfloor_memory.yaml — E13a: recurrent memory (LSTM) probe, interfloor
#   mlagents-learn config/elevator_ppo_e13_interfloor_memory.yaml --run-id=elev-e13-m-interfloor-memory-NN
#
# Cheapest possible test of "does temporal/history context help interfloor" (EXPERIMENT_PLAN.md E13,
# following the E12 interfloor result: PPO -14.4%/-16.4% vs LOOK/ETA despite clean 10M-step
# convergence). Adds ML-Agents' built-in recurrent policy (network_settings.memory) -- a small LSTM
# over the trainer's own hidden state -- on top of the EXACT SAME bignet2 recipe/obs/action as
# elev-e12-m-interfloor-01, so memory is the only variable. Purely a training-config change: no new
# observations, no C# changes, no new Unity build -- runs directly against the existing M headless
# build (Builds/HeadlessTrainer/RLevatorTrainer.app).
#
# NOTE: per Sutton&Barto/Crites&Barto and the 2024 D3QN paper, neither uses per-tick history --
# both are single-snapshot Markovian designs (our hallCallAge block already gives some implicit
# recency signal). This run tests whether that assumption is actually true for interfloor traffic,
# not assumed from precedent -- if the fully-Markovian baseline is already sufficient, this should
# perform about the same as elev-e12-m-interfloor-01; a clear improvement means the problem needs
# genuine temporal reasoning, motivating the bigger floor-axis-conv/attention investment (E13b).
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
      memory:
        sequence_length: 64
        memory_size: 128
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
environment_parameters:
  traffic_pattern: 3
  use_day_cycle: 0
