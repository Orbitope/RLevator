# config/elevator_ppo_sanity.yaml — E2 sanity pass (EXPERIMENT_PLAN.md M1/E2)
#   mlagents-learn config/elevator_ppo_sanity.yaml --run-id=<name>
#
# Fast first-pass config: same hyperparameters as config/elevator_ppo.yaml, but
# max_steps cut way down (100k vs 5M) just to confirm the pipeline works end-to-end
# (reward climbing, no crashes/mismatches) before committing to a long real run.
#
# Deliberately NO environment_parameters curriculum block: the agent is wired to
# S_BuildingConfig (fixed 3-car fleet, EXPERIMENT_PLAN.md §3 rung S), matching
# exactly how LOOK/ETA were evaluated in the E1 baseline sweep. The main
# elevator_ppo.yaml's active_elevators curriculum (2->4->7->10) is for later
# fleet-size-generalization work (E7) against a variable-fleet preset, not this
# rung-S parity check — using it here would fight the fixed fleet and invalidate
# the comparison.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 256
      num_layers: 2
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 3
    max_steps: 100000
    time_horizon: 256
    summary_freq: 5000
