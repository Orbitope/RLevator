# config/elevator_ppo_e3_l_bignet2.yaml — E3 rung-L, resumed on E6's winning recipe (bignet2)
#   mlagents-learn config/elevator_ppo_e3_l_bignet2.yaml --run-id=<name>
#
# Resuming the E3 scale ladder (paused after S, M -- see EXPERIMENT_PLAN.md E6) directly on
# bignet2 (768 hidden units x 4 layers), the network size that matched LOOK/ETA at rung M
# (2110.6/5000 delivered vs LOOK's 2119.2, ETA's 2109.8 -- essentially tied, at 10M steps).
# Rung L is a bigger fleet (8 cars, 30 floors vs M's 5 cars/16 floors) so the same architecture
# question applies again: does capacity that closed the gap at M also scale to L, or does L need
# even more? 5M steps first (cheap-test-first, same protocol as every prior rung/size decision in
# this doc), extend to 10M only if still climbing at the 5M cutoff, same as M's bignet/bignet2.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
