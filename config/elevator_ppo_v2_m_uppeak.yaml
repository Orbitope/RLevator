# config/elevator_ppo_v2_m_uppeak.yaml — V2 pattern coverage: rung M, UpPeak, nominal load
#   mlagents-learn config/elevator_ppo_v2_m_uppeak.yaml --run-id=<name>
#
# Same recipe as elev-v2-m-midday-01, UpPeak instead of Midday -- UpPeak was the ONLY pattern
# ever tested for most of this project's history (before E12/E15), so this is the most direct
# apples-to-apples continuity check on the corrected traffic.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
environment_parameters:
  traffic_pattern: 0
  use_day_cycle: 0
