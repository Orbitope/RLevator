# config/elevator_ppo_e6b_m_10m.yaml — extends elev-e6b-m-ppo-01 from 5M to 10M steps
#   mlagents-learn config/elevator_ppo_e6b_m_10m.yaml --run-id=elev-e6b-m-ppo-01 --resume
#
# Architecture B's 5M-step run was still climbing (not plateaued) at cutoff: reward went
# -26,800 -> -10,700 over the run, with the last ~1M steps still inching up (-11.2k -> -10.7k),
# same "still learning, not a capacity ceiling" signature we saw for the flat-MLP M run before its
# 5M->10M extension (elevator_ppo_e3_m_10m.yaml). So before touching hidden_units/num_layers, this
# just doubles the step budget on the identical architecture/hyperparameters and resumes from the
# existing checkpoint rather than retraining from scratch — same reasoning, same cheap-test-first
# order of operations.
#
# NOTE: ML-Agents' linear learning_rate/beta/epsilon schedules recompute from
# current_step/max_steps on resume — bumping max_steps here means those jump back up from their
# fully-decayed 5M-step values rather than continuing to decay smoothly. Expected and generally
# benign; flagging so a mid-run LR discontinuity in TensorBoard isn't mistaken for a bug.
behaviors:
  ElevatorAttention:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 256
      num_layers: 2
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 10.0e6
    time_horizon: 256
    summary_freq: 20000
