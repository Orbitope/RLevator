# config/elevator_ppo_e3_m.yaml — E3 rung-M scale-ladder run (EXPERIMENT_PLAN.md E3)
#   mlagents-learn config/elevator_ppo_e3_m.yaml --run-id=<name>
#
# Same hyperparameters as config/elevator_ppo.yaml (the full 5M-step config), but
# deliberately WITHOUT its active_elevators curriculum block: the agent is wired to
# M_BuildingConfig (fixed 5-car fleet, EXPERIMENT_PLAN.md §3 rung M), matching
# exactly how LOOK/ETA were evaluated in the E1 baseline sweep. Pinning/curriculum-
# growing active_elevators up to 10 here would fight the fixed fleet and invalidate
# the comparison — same reasoning as config/elevator_ppo_sanity.yaml, just at the
# real 5M-step budget instead of the 100k sanity pass.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 256
      num_layers: 2
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
