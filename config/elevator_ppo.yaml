# config/elevator_ppo.yaml
#   mlagents-learn config/elevator_ppo.yaml --run-id=elev01
# The behavior name MUST match the "Behavior Name" on the BehaviorParameters component.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3            # entropy bonus - keeps cars exploring
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 256
      num_layers: 2
      normalize: true         # important - observation blocks vary in scale
    reward_signals:
      extrinsic:
        # gamma=0.99 gives a ~50s effective horizon at this env's 0.5s decision cadence — roughly
        # one round trip in a small building, too short once buildings get tall (delivered reward
        # lands many masked-NOOP decisions after the pivotal choice). 0.995 ~doubles the effective
        # horizon to ~200s; EXPERIMENT_PLAN.md §2 calls for sweeping {0.99, 0.995, 0.999} — this is
        # the sweep's middle default, not a final answer.
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    # doubled from 128 alongside gamma, for the same reason — a longer discount horizon needs a
    # long enough rollout window (time_horizon) for GAE to actually see that far.
    time_horizon: 256
    summary_freq: 20000

# ----------------------------------------------------------------------------
# OPTIONAL: curriculum over the active fleet size. Leave this out and the
# BuildingConfig will randomize the in-service count each episode (recommended).
# With this block, ML-Agents pins "active_elevators" (read in OnEpisodeBegin) and
# grows the fleet as the policy improves - learn to coordinate 2 cars, then 10.
# ----------------------------------------------------------------------------
environment_parameters:
  active_elevators:
    curriculum:
      - name: pair
        completion_criteria:
          measure: reward
          behavior: ElevatorController
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.6
        value: 2
      - name: small
        completion_criteria:
          measure: reward
          behavior: ElevatorController
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.7
        value: 4
      - name: medium
        completion_criteria:
          measure: reward
          behavior: ElevatorController
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.8
        value: 7
      - name: full
        value: 10
