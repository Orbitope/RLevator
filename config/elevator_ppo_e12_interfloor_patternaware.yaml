# config/elevator_ppo_e12_interfloor_patternaware.yaml — E12 interfloor specialist, pattern-aware obs
#   mlagents-learn config/elevator_ppo_e12_interfloor_patternaware.yaml --run-id=elev-e12-<size>-interfloor-patternaware-NN
#
# Retrain of the interfloor specialist (elev-e12-m-interfloor-01, which lost to LOOK/ETA by -14.4%/
# -16.4% despite a clean 10M-step convergence) with the `pattern` observation block turned on
# (ObservationConfig_PatternAware: baseline + pattern one-hot, obsSize 254->259 on rung M) so the
# policy gets an explicit traffic-regime signal instead of inferring it from indirect hall-call
# statistics. NOTE: for a single-pattern specialist this one-hot is CONSTANT throughout training
# (always Midday/interfloor) -- it can shift bias terms but the network has no variance in this
# feature to condition behavior on, so it is not expected to change the specialist's result (the
# 2024 pattern-aware-DRL literature's use of an explicit pattern signal is for a multi-pattern
# generalist, where the signal actually varies). Running anyway per explicit request, to verify
# empirically rather than assume. Same bignet2 recipe (768x4) otherwise; traffic pattern still
# Midday (enum 3) via the same runtime env-param override as the baseline-obs run.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
environment_parameters:
  traffic_pattern: 3
  use_day_cycle: 0
