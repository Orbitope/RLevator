# config/elevator_ppo_e5_m_fullstate.yaml — E5 obs ablation Arm 1: full state, rung M
#   mlagents-learn config/elevator_ppo_e5_m_fullstate.yaml --run-id=<name>
#
# Bumped network size beyond bignet2 (768x4) per user request, applied to all E5 arms regardless
# of obs config: 1024 hidden units x 5 layers ("bignet3" size). Isolates "does more observation
# info help" per EXPERIMENT_PLAN.md E5, using a network at least as capable as the current best
# (bignet2, which matched LOOK/ETA at rung M with the baseline obs) so any obs-driven gain/loss
# isn't confounded by insufficient capacity.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 1024
      num_layers: 5
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
