# config/elevator_ppo_e5_m_fullstate.yaml — E5 obs ablation Arm 1: full state, rung M
#   mlagents-learn config/elevator_ppo_e5_m_fullstate.yaml --run-id=<name>
#
# Same network/hyperparameters as bignet2 (768x4, the recipe that matched LOOK/ETA at rung M) --
# only the observation changes (ObservationConfig_FullState: everything on, including
# queueLengths/timeOfDay/pattern which no prior run in this project has used). Isolates "does more
# observation info help" as the only variable per EXPERIMENT_PLAN.md E5.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5.0e6
    time_horizon: 256
    summary_freq: 20000
