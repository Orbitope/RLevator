# config/elevator_ppo_e12_interfloor.yaml — E12 traffic-pattern realism (Midday pure-interfloor specialist)
#   mlagents-learn config/elevator_ppo_e12_interfloor.yaml --run-id=elev-e12-<size>-interfloor-NN
#
# Same bignet2 recipe (768x4, baseline obs) as the E2/E3/E6 UpPeak headline so TRAFFIC PATTERN is the
# only variable vs. that baseline. The pattern is injected at runtime via ML-Agents environment
# parameters (ElevatorControllerAgent.OnEpisodeBegin reads traffic_pattern / use_day_cycle), so one
# headless build per size serves every pattern -- no per-pattern rebuild. Enum: 0=UpPeak 1=DownPeak
# 2=Lunch 3=Midday(pure interfloor) 4=Uniform. See EXPERIMENT_PLAN.md E12.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 10.0e6
    time_horizon: 256
    summary_freq: 20000
environment_parameters:
  traffic_pattern: 3
  use_day_cycle: 0
