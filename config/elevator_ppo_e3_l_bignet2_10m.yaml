# config/elevator_ppo_e3_l_bignet2_10m.yaml — extends elev-e3-l-bignet2-01 from 5M to 10M steps
#   mlagents-learn config/elevator_ppo_e3_l_bignet2_10m.yaml --run-id=elev-e3-l-bignet2-01 --resume
#
# Rung L's 5M-step result was a severe underperformance vs LOOK/ETA (893/5000 delivered vs
# ~2691, a ~67% shortfall -- much worse than any gap seen at rung M) despite reward still
# (slowly) improving at the cutoff. L is a substantially bigger coordination problem than M
# (8 cars/30 floors vs 5 cars/16 floors), so extending to 10M is the same cheap-test-first move
# used throughout this project, but expectations should be set accordingly: M's ~25% gap closed
# with a single 4x capacity increase (bignet2) at 10M steps; L's ~67% gap is unlikely to close
# with a single step-budget doubling on the same network size, and may need iterative
# extensions and/or an even bigger network once this run's trend is visible.
behaviors:
  ElevatorController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 768
      num_layers: 4
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 10.0e6
    time_horizon: 256
    summary_freq: 20000
